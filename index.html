<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Infinity Painel — Acesso</title>
  <meta name="description" content="Página de entrada para conhecer o Infinity Painel.">
  <style>
    :root {
      --bg: #030207;
      --ink: #fffdfa;
      --muted: #b8b0c8;
      --line: rgba(174, 91, 255, .34);
      --lime: #8dff00;
      --lime-2: #c7ff3e;
      --purple: #a84dff;
      --cyan: #2bd5ff;
      --panel: rgba(13, 10, 22, .72);
      --shadow: 0 30px 120px rgba(0,0,0,.60), 0 0 80px rgba(168,77,255,.16), 0 0 72px rgba(141,255,0,.10);
      --display: Impact, "Arial Black", "Roboto Condensed", "Oswald", system-ui, sans-serif;
      --body: Arial, Helvetica, system-ui, sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: var(--body);
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 12%, rgba(168,77,255,.34), transparent 29rem),
        radial-gradient(circle at 86% 26%, rgba(141,255,0,.18), transparent 24rem),
        radial-gradient(circle at 50% 115%, rgba(43,213,255,.10), transparent 30rem),
        linear-gradient(180deg, #06030d 0%, #030207 100%);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .12;
      background-image:
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at 50% 18%, #000 0 34%, transparent 78%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 0 58%, rgba(168,77,255,.18) 58.15%, transparent 59.1%),
        linear-gradient(145deg, transparent 0 80%, rgba(141,255,0,.10) 80.2%, transparent 81%);
      opacity: .55;
    }

    main {
      min-height: 100svh;
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      padding: clamp(24px, 4vw, 56px);
    }

    .gate {
      width: min(760px, 100%);
      min-height: min(620px, calc(100svh - 48px));
      display: grid;
      place-items: center;
      padding: clamp(30px, 6vw, 76px);
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.028)),
        var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      position: relative;
      overflow: hidden;
    }

    .gate::before {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      right: -170px;
      top: -150px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(141,255,0,.28), transparent 68%);
      filter: blur(2px);
    }

    .gate::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 24px;
    }

    .mark {
      width: 118px;
      height: 64px;
      display: grid;
      place-items: center;
      font-family: Georgia, serif;
      font-size: 106px;
      font-weight: 900;
      line-height: .52;
      letter-spacing: -.08em;
      color: transparent;
      background: linear-gradient(115deg, var(--purple) 0 46%, var(--lime) 54% 100%);
      -webkit-background-clip: text;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(168,77,255,.58)) drop-shadow(0 0 18px rgba(141,255,0,.24));
      user-select: none;
    }

    .eyebrow {
      margin: 0;
      font-family: var(--mono);
      font-size: clamp(11px, 1.8vw, 13px);
      font-weight: 900;
      letter-spacing: .36em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      max-width: 680px;
      margin: 0;
      font-family: var(--display);
      font-size: clamp(54px, 12vw, 116px);
      line-height: .84;
      letter-spacing: .005em;
      text-transform: uppercase;
      text-wrap: balance;
    }

    .sub {
      max-width: 510px;
      margin: -4px 0 4px;
      color: var(--muted);
      font-size: clamp(16px, 2.4vw, 20px);
      line-height: 1.55;
    }

    .btn {
      min-height: 64px;
      width: min(100%, 430px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 17px 24px;
      border-radius: 14px;
      border: 1px solid rgba(141,255,0,.76);
      background: linear-gradient(180deg, #d7ff45 0%, #78d800 100%);
      color: #081000;
      font-weight: 950;
      letter-spacing: .035em;
      text-transform: uppercase;
      text-decoration: none;
      box-shadow: 0 0 42px rgba(141,255,0,.36), inset 0 1px 0 rgba(255,255,255,.62);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 0 58px rgba(141,255,0,.50), inset 0 1px 0 rgba(255,255,255,.62); }
    .btn:active { transform: translateY(0) scale(.985); }
    .btn:focus-visible { outline: 2px solid var(--ink); outline-offset: 4px; }

    .fineprint {
      margin: 4px 0 0;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,253,250,.52);
    }

    @media (max-width: 620px) {
      main { padding: 16px; }
      .gate { min-height: calc(100svh - 32px); border-radius: 22px; padding: 34px 22px; }
      .gate::after { inset: 12px; border-radius: 16px; }
      h1 { font-size: clamp(48px, 16vw, 76px); }
      .sub { font-size: 16px; }
      .btn { min-height: 62px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <main aria-label="Entrada Infinity Painel">
    <section class="gate" aria-labelledby="gate-title">
      <div class="content">
        <div class="mark" aria-hidden="true">∞</div>
        <p class="eyebrow">Infinity Painel</p>
        <h1 id="gate-title">Acesso exclusivo para revenda</h1>
        <p class="sub">Conheça a estrutura premium para vender IPTV com painel, créditos e suporte pelo WhatsApp.</p>
        <a class="btn" href="landing.html" aria-label="Quero acessar o Infinity Painel">Quero acessar o Infinity Painel</a>
        <p class="fineprint">Toque no botão para abrir a página principal.</p>
      </div>
    </section>
  </main>
</body>
</html>
